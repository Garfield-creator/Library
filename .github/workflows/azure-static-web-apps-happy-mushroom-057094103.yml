name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      # Checkout repository
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Setup Node.js (Angular requires Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Adjust to match your Angular 21 requirements

      # Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Build Angular app
      - name: Build Angular App
        run: npm run build -- --configuration production

      # Get Id Token for OIDC
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const core = require('@actions/core');
            return await core.getIDToken();
          result-encoding: string

      # Deploy to Azure Static Web Apps
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_MUSHROOM_057094103 }}
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "/"                        # Root of repository (Angular build handled above)
          api_location: ""                         # No API
          output_location: "dist/MikaelRedCodeLibrary/browser" # Folder containing index.html
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
