<div class="container mt-4">

  <div class="row mb-3">
    <div class="col-md-6">
      <button class="btn btn-primary" *ngIf="isLoggedIn" (click)="goToCreate()">
        Lägg till bok
      </button>
    </div>
    <div class="col-md-6 text-md-end mt-2 mt-md-0">
      <input type="text"
             class="form-control d-inline-block"
             placeholder="Sök på titel eller författare..."
             [ngModel]="searchTerm"
             (ngModelChange)="onSearchChange($event)">
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-bordered table-striped">
      <colgroup>
        <col style="width: 40%">
        <col style="width: 25%">
        <col style="width: 15%">
        <col style="width: 20%" *ngIf="isLoggedIn">
      </colgroup>

      <thead>
        <tr>
          <th>Titel</th>
          <th>Författare</th>
          <th>Publiseringsdatum</th>
          <th *ngIf="isLoggedIn">Åtgärder</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let book of pagedBooks; trackBy: trackById">
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.publishingDate | date:'yyyy-MM-dd' }}</td>

          <td *ngIf="isLoggedIn">

            <button class="btn btn-warning btn-sm me-2"
                    (click)="goToEdit(book.id)">
              <i class="fa fa-edit me-1"></i>
              Redigera
            </button>

            <button class="btn btn-danger btn-sm"
                    (click)="confirmDelete(book.id)">
              <i class="fa fa-trash me-1"></i>
              Radera
            </button>

          </td>
        </tr>

        <tr *ngIf="filteredCount === 0">
          <td [attr.colspan]="isLoggedIn ? 4 : 3" class="text-center">
            Inga böcker tillgängliga. Lägg gärna till några!
          </td>
        </tr>

      </tbody>

    </table>
    </div>
    <nav *ngIf="filteredCount > pageSize" aria-label="Book pagination">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="onPageChange(currentPage - 1)">
            Previous
          </button>
        </li>

        <li class="page-item"
            *ngFor="let page of [].constructor(totalPages); let i = index"
            [class.active]="currentPage === i + 1">
          <button class="page-link" (click)="onPageChange(i + 1)">
            {{ i + 1 }}
          </button>
        </li>

        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" (click)="onPageChange(currentPage + 1)">
            Next
          </button>
        </li>
      </ul>
    </nav>

  </div>
