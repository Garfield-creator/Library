<div class="container mt-4">

  <div class="row mb-3">
    <div class="col-md-6" *ngIf="isLoggedIn">
      <button class="btn btn-primary"
              (click)="goToCreate()"
              [disabled]="quotes.length >= maxQuotesPerUser">
        Lägg till citat
      </button>

      <div class="text-muted mt-2" *ngIf="quotes.length >= maxQuotesPerUser">
        Du har nått maxgränsen på {{ maxQuotesPerUser }} citat.
      </div>
    </div>
  </div>

  <div class="row">

    <div class="col-md-6 col-lg-4 mb-3" *ngFor="let quote of quotes">
      <div class="card h-100">

        <div class="card-body">
          <blockquote class="blockquote mb-2">
            <p class="mb-0">"{{ quote.text }}"</p>
          </blockquote>

          <footer class="blockquote-footer mt-2">
            {{ quote.source }}
          </footer>
        </div>

        <div class="card-footer border-top-0" *ngIf="isLoggedIn">
          <button class="btn btn-warning btn-sm me-2"
                  (click)="goToEdit(quote.id!)">
            Redigera
          </button>

          <button class="btn btn-danger btn-sm"
                  (click)="confirmDelete(quote.id!)">
            Radera
          </button>
        </div>

      </div>
    </div>

    <div *ngIf="quotes.length === 0" class="col-12 text-center text-muted">
      Inga citat tillgängliga. Lägg gärna till några!
    </div>

  </div>

</div>
