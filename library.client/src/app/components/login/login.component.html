<div class="container mt-4">
  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="mb-3">
      <label>Användarnamn</label>
      <input class="form-control" formControlName="username">
      <div class="text-danger" *ngIf="form.get('username')?.errors?.['required'] && submitted">Användarnamn är obligatorisk.</div>
    </div>

    <div class="mb-3">
      <label>Lösenord</label>
      <input type="password" class="form-control" formControlName="password">
      <div class="text-danger" *ngIf="submitted && form.get('password')?.errors?.['required']">Lösenord är obligatoriskt.</div>
    </div>
    <button class="btn btn-success mt-3" type="submit">{{ loading ? 'Loggar in...' : 'Logga in' }}</button>
  </form>
  <div *ngIf="error" class="alert alert-danger mt-2">
    {{ error }}
  </div>
</div>
